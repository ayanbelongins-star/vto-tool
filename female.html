<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --pink-glaze: #ff85a2;
            --dark-velvet: #1a1a1a;
            --soft-cream: #fff5f7;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--soft-cream);
            color: var(--dark-velvet);
        }

        /* Modern Glassmorphism Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; text-decoration: none; color: var(--dark-velvet); }
        .logo span { color: var(--pink-glaze); }

        /* Navigation Filter Pills */
        .filter-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 0;
            overflow-x: auto;
        }

        .pill {
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #ddd;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .pill:hover, .pill.active {
            background: var(--dark-velvet);
            color: white;
            border-color: var(--dark-velvet);
        }

        /* Bento Grid Layout */
        .bento-grid {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 250px;
            gap: 20px;
        }

        .bento-item {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #eee;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            text-decoration: none;
        }

        .bento-item:hover { transform: scale(0.98); }

        /* Custom Sizes for Visual Interest */
        .large { grid-column: span 2; grid-row: span 2; }
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        .bento-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .bento-item:hover img { transform: scale(1.1); }

        /* Overlay Text */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            box-sizing: border-box;
        }

        .overlay h3 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .overlay p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9rem; }

        .vto-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--pink-glaze);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 133, 162, 0.4);
        }

        /* Floating Capture Button (Snapchat style) */
        .floating-camera {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--pink-glaze);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.5);
            cursor: pointer;
            z-index: 2000;
            border: 4px solid white;
        }

        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .large, .wide, .tall { grid-column: span 2; grid-row: span 1; }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On | 3D Mirror</title>
    <style>
        :root {
            --snap-yellow: #fffc00;
            --dark-ui: #111111;
            --border-color: #333;
            --shadow-3d: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* --- STAGE 1: CAMERA UI --- */
        #camera-screen {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        #video-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .snap-controls {
            position: relative;
            bottom: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            z-index: 10;
        }

        .shutter-outer {
            width: 85px;
            height: 85px;
            background: transparent;
            border: 6px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .shutter-inner {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            transition: transform 0.1s;
        }

        .shutter-outer:active .shutter-inner {
            transform: scale(0.85);
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.3);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* --- STAGE 2: SPLIT SCREEN MIRROR --- */
        #mirror-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: row;
        }

        .mirror-left {
            flex: 1;
            height: 100%;
            background: #000;
            border-right: 4px solid var(--snap-yellow);
            position: relative;
        }

        #captured-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror-right {
            flex: 1;
            height: 100%;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .selection-header {
            padding: 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        /* UPDATED: Removed centering so varieties fill the width */
        #dynamic-content-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .selection-box-3d {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin: auto;
            perspective: 1000px;
        }

        .gender-card {
            flex: 1;
            height: 150px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            color: #333;
            box-shadow: var(--shadow-3d);
            transition: transform 0.4s ease, box-shadow 0.4s ease, background-color 0.3s ease, color 0.3s ease;
            transform-style: preserve-3d;
        }

        .gender-card:hover {
            transform: rotateY(-10deg) translateZ(20px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.25);
            background-color: #333;
            color: #fff;
        }

        .female-card:hover {
            transform: rotateY(10deg) translateZ(20px);
        }

        .retake-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 20;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--snap-yellow);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            #mirror-screen { flex-direction: column; }
            .mirror-left { height: 50%; border-right: none; border-bottom: 4px solid var(--snap-yellow); }
            .mirror-right { height: 50%; }
        }
    </style>
</head>
<body>

    <div id="camera-screen">
        <video id="video-feed" autoplay playsinline></video>
        <div class="snap-controls">
            <label class="icon-btn" title="Upload">
                📸
                <input type="file" id="file-input" hidden accept="image/*">
            </label>
            <div class="shutter-outer" id="take-photo">
                <div class="shutter-inner"></div>
            </div>
            <div class="icon-btn">🔄</div>
        </div>
    </div>

    <div id="mirror-screen">
        <div class="mirror-left">
            <button class="retake-btn" onclick="location.reload()">↺ Retake</button>
            <img id="captured-image" src="" alt="Captured Mirror View">
            <canvas id="capture-canvas" style="display:none;"></canvas>
        </div>

        <div class="mirror-right">
            <div class="selection-header">
                <h2>Virtual Try-On</h2>
                <p>Select your style to begin</p>
            </div>

            <div id="dynamic-content-area">
                <div class="loader" id="content-loader"></div>
                <div class="selection-box-3d" id="gender-selection-ui">
                    <div class="gender-card male-card" id="load-male-content">Male</div>
                    <div class="gender-card female-card" id="load-female-content">Female</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const cameraScreen = document.getElementById('camera-screen');
        const mirrorScreen = document.getElementById('mirror-screen');
        const capturedImage = document.getElementById('captured-image');
        const fileInput = document.getElementById('file-input');
        const canvas = document.getElementById('capture-canvas');
        const contentArea = document.getElementById('dynamic-content-area');
        const genderUi = document.getElementById('gender-selection-ui');
        const loader = document.getElementById('content-loader');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera blocked. Please enable permissions.");
            }
        }

        document.getElementById('take-photo').addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            showMirror(canvas.toDataURL('image/png'));
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => showMirror(event.target.result);
                reader.readAsDataURL(file);
            }
        });

        function showMirror(imageSrc) {
            capturedImage.src = imageSrc;
            cameraScreen.style.display = 'none';
            mirrorScreen.style.display = 'flex';
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // --- IMPROVED LINKING LOGIC ---
        async function loadContent(pageName) {
            genderUi.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(pageName);
                if (!response.ok) throw new Error('File not found');
                const html = await response.text();
                loader.style.display = 'none';
                contentArea.innerHTML = html;
            } catch (error) {
                loader.style.display = 'none';
                contentArea.innerHTML = `<p style="color:red; text-align:center;">Error: Ensure ${pageName} is in the same folder.</p>`;
            }
        }

        document.getElementById('load-male-content').addEventListener('click', () => loadContent('male.html'));
        document.getElementById('load-female-content').addEventListener('click', () => loadContent('female.html'));

        initCamera();
    </script>
</body>
</html>
